name: Build and Push Docker Image

on:
  push:
    branches: ["master"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xwalls/expense-tracker-ocr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deployment
        if: success()
        uses: dokploy/dokploy-action@v1
        with:
          # Add these secrets in: Settings → Secrets → Actions
          # DOKPLOY_URL  : your Dokploy instance URL, e.g. https://dokploy.example.com
          # DOKPLOY_TOKEN: API key generated in Dokploy → Settings → API
          # DOKPLOY_APP_ID: Application ID found in Dokploy → Application → Settings
          url: ${{ secrets.DOKPLOY_URL }}
          token: ${{ secrets.DOKPLOY_TOKEN }}
          appId: ${{ secrets.DOKPLOY_APP_ID }}
